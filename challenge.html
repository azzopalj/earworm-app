<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earworm Challenge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 48px 36px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }

        .emoji { font-size: 72px; margin-bottom: 16px; }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.55);
            margin-bottom: 32px;
        }

        .score-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .challenger { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .mode       { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 16px; }

        .score-label { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
        .score-value {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }

        .btn-primary {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .hint {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-top: 16px;
            line-height: 1.5;
        }

        .app-store-note {
            display: none;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎯</div>
        <h1>You've Been Challenged!</h1>
        <p class="subtitle" id="songs-count">Loading challenge...</p>

        <div class="score-card">
            <div class="challenger" id="challenger-name">Your friend</div>
            <div class="mode" id="mode-name"></div>
            <div class="score-label">Their Score</div>
            <div class="score-value" id="challenger-score">—</div>
        </div>

        <a class="btn btn-primary" id="open-btn" href="#">
            🎵 Accept Challenge
        </a>
        <a class="btn btn-secondary" href="https://apps.apple.com/app/earworm/id0000000000" id="download-btn">
            Download Earworm
        </a>

        <p class="hint" id="hint-text">
            Tap "Accept Challenge" to open the Earworm app and play the same songs!
        </p>
        <p class="app-store-note" id="store-note">
            Don't have Earworm yet? Download it free from the App Store.
        </p>
    </div>

    <script>
        // Parse query params from the URL
        const params = new URLSearchParams(window.location.search);
        const songs    = params.get('songs') || '';
        const score    = params.get('score') || '0';
        const name     = params.get('name')  || 'Your friend';
        const mode     = params.get('mode')  || 'Challenge';
        const sub      = params.get('sub')   || '';

        // Update UI
        document.getElementById('challenger-name').textContent = name;
        document.getElementById('challenger-score').textContent = parseInt(score).toLocaleString();
        document.getElementById('mode-name').textContent = sub ? `${mode} – ${sub}` : mode;

        const songCount = songs.split(',').filter(Boolean).length;
        document.getElementById('songs-count').textContent =
            `Beat their score on the same ${songCount} songs!`;

        // Build the deep link
        const deepLink = `earworm://challenge?songs=${encodeURIComponent(songs)}&score=${score}&name=${encodeURIComponent(name)}&mode=${encodeURIComponent(mode)}&sub=${encodeURIComponent(sub)}`;
        document.getElementById('open-btn').href = deepLink;

        // Try to open the app automatically on page load
        // If app isn't installed, the redirect fails silently
        window.location.href = deepLink;

        // After a short delay, if still on page, show the download note
        setTimeout(() => {
            document.getElementById('store-note').style.display = 'block';
        }, 2500);
    </script>
</body>
</html>
