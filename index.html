<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earworm — Music Guessing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        .emoji { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 42px; font-weight: 800; margin-bottom: 12px; }
        p  { font-size: 18px; color: rgba(255,255,255,0.6); max-width: 400px; line-height: 1.6; }
        .badge {
            display: inline-block;
            margin-top: 32px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div>
        <div class="emoji">🎵</div>
        <h1>Earworm</h1>
        <p>How well do you know your music? Guess songs from your library, by genre, decade, or artist.</p>
        <div class="badge">Available on iOS — coming soon to the App Store</div>
    </div>
</body>
</html>
